# PPTX 智能讲解视频生成器 - 配置文件
# 此文件为可选配置，优先级高于 .env 文件

[paths]
# LibreOffice 路径（必须配置完整的可执行文件路径）
# Windows 示例: D:\Soft\LibreOffice\program\soffice.exe
# Linux 示例: /usr/bin/soffice
libreoffice_path = D:\Soft\LibreOffice\program\soffice.exe

# FFmpeg 路径（必须配置完整的可执行文件路径）
# Windows 示例: D:\Soft\ffmpeg\bin\ffmpeg.exe
ffmpeg_path =D:\Soft\ffmpeg\bin\ffmpeg.exe
ffprobe_path =D:\Soft\ffmpeg\bin\ffprobe.exe

# Poppler 路径（配置 bin 目录路径，不是可执行文件）
# pdf2image 依赖，用于 LibreOffice PDF 转图片
# Windows 示例: D:\Soft\poppler\Library\bin
poppler_path = D:\Soft\poppler-25.12.0\Library\bin

# 字体路径（留空则使用系统默认）
font_title =
font_body =

[llm]
# LLM 提供商: claude, zhipu, deepseek, qianwen
provider = claude

# API Keys（也可通过环境变量设置）
# anthropic_api_key =
# zhipuai_api_key =
# deepseek_api_key =
# qianwen_api_key =

[tts]
# TTS 语音配置
voice = zh-CN-XiaoxiaoNeural
# 注意：百分号需要写成 %% 来转义
rate = +0%%
pitch = +0Hz

[video]
# 视频分辨率
width = 1920
height = 1080

[performance]
# 性能优化选项
# 是否启用 TTS 并发处理
enable_concurrent_tts = true

# 是否启用缓存
enable_cache = true

# API 重试配置
max_retries = 3
base_retry_delay = 2
