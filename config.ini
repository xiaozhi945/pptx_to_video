# PPTX 智能讲解视频生成器 - 配置文件
# 此文件为可选配置，优先级高于 .env 文件

[paths]
# FFmpeg 路径（用于音视频合成）
# Windows 示例: D:\Soft\ffmpeg\bin\ffmpeg.exe
ffmpeg_path = D:\tools\ffmpeg\bin\ffmpeg.exe

# FFprobe 路径（用于获取音频时长）
# Windows 示例: D:\Soft\ffmpeg\bin\ffprobe.exe
ffprobe_path = D:\tools\ffmpeg\bin\ffprobe.exe

[tts]
# TTS 语音 voice = zh-CN-XiaoxiaoNeural
voice = en-US-AriaNeural

# 语速（-50% 到 +100%）
# 注意：百分号必须写成 %%
rate = +0%%

# 音调（-50Hz 到 +50Hz）
pitch = +0Hz

[video]
# 视频分辨率
width = 1920
height = 1080

[performance]
# TTS 并发处理（速度提升约 6 倍）
enable_concurrent_tts = true

# 启用缓存（节省 API 费用）
enable_cache = true

# API 最大重试次数
max_retries = 3

# 基础重试延迟（秒）
base_retry_delay = 2

[subtitle]
# 是否生成字幕
enable = true

# 字幕模式: srt（独立文件）, soft（软字幕）, hard（硬字幕）, none（不生成）
mode = hard

# 字幕类型: word（逐词显示）, sentence（整句显示）
type = word

# 逐词字幕每行最大字符数
max_chars_per_line = 42

# 硬字幕配置（仅当 mode=hard 时生效）
font_size = 12
font_name = Arial
# 描边宽度（1-4，推荐 2-3）
outline_width = 1
# 字幕样式: 白色字体+黑色描边（任何背景都清晰）
# 如需更强对比度，可在 subtitle_generator.py 中添加半透明背景
# BackColour=&H80000000 (半透明黑色背景条)

# 字幕语言代码（用于软字幕元数据）
# chi=中文, eng=英文, jpn=日文, kor=韩文, fre=法文, ger=德文, spa=西班牙文
language = eng
