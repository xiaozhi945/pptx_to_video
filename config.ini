# PPTX 智能讲解视频生成器 - 配置文件
# 此文件为可选配置，优先级高于 .env 文件

[paths]
# FFmpeg 路径（用于音视频合成）
# Windows 示例: D:\Soft\ffmpeg\bin\ffmpeg.exe
ffmpeg_path = D:\Soft\ffmpeg\bin\ffmpeg.exe

# FFprobe 路径（用于获取音频时长）
# Windows 示例: D:\Soft\ffmpeg\bin\ffprobe.exe
ffprobe_path = D:\Soft\ffmpeg\bin\ffprobe.exe

[llm]
# LLM 提供商: claude, zhipu, deepseek, qianwen
provider = claude

[tts]
# TTS 语音
voice = zh-CN-XiaoxiaoNeural

# 语速（-50% 到 +100%）
# 注意：百分号必须写成 %%
rate = +0%%

# 音调（-50Hz 到 +50Hz）
pitch = +0Hz

[video]
# 视频分辨率
width = 1920
height = 1080

[performance]
# TTS 并发处理（速度提升约 6 倍）
enable_concurrent_tts = true

# 启用缓存（节省 API 费用）
enable_cache = true

# API 最大重试次数
max_retries = 3

# 基础重试延迟（秒）
base_retry_delay = 2
